<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MikeCitra Power Dashboard</title>
    <link rel="stylesheet" href="admin.css">
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>
<body>

<div class="dashboard">
    <div class="sidebar">
        <h2>MikeCitra Admin</h2>
        <ul>
            <li onclick="showPage('home')">🏠 Dashboard</li>
            <li onclick="showPage('upload')">📤 Update Premi (Excel)</li>
            <li onclick="logout()" style="color: #ef4444;">🚪 Logout</li>
        </ul>
    </div>

    <div class="content" style="padding: 20px; color: white; width: 100%;">
        
        <div id="home" class="page">
            <h1>Halo Mike, Selamat Datang!</h1>
            <p>Database lu aman terkendali. Pilih menu upload buat update data produk baru.</p>
        </div>

        <div id="upload" class="page" style="display:none;">
            <h1>Update Data Premi (XLSX)</h1>
            <div class="card-admin" style="background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155;">
                <p>Upload file .xlsx (Contoh: LEGACY PRO.xlsx) untuk sinkronisasi harga premi secara otomatis.</p>
                <input type="file" id="excelFile" accept=".xlsx, .xls" style="margin-bottom: 20px; display: block;">
                <button onclick="prosesExcel()" style="background:#10b981; color: white; padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">
                    SINKRON DATA SEKARANG
                </button>
                <p id="statusUpload" style="margin-top: 15px; font-weight: bold;"></p>
            </div>
        </div>

    </div>
</div>

<script src="admin.js"></script>
</body>
</html>
