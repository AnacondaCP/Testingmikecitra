<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Allianz - MikeCitra</title>
    <link rel="stylesheet" href="css/calculator.css">
</head>
<body>

<nav>
    <div class="logo">MikeCitra.ins</div>
    <div>
        <a href="index.html">Home</a>
        <a href="calculator.html" class="active">Calculator</a>
    </div>
</nav>

<div class="container" style="max-width: 600px; margin: 40px auto; padding: 20px;">
    <div class="card calc-card" style="background: #1e293b; color: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.3);">
        <h2 style="text-align: center; color: #38bdf8;">Kalkulator Premi Otomatis</h2>
        <p style="text-align: center; color: #94a3b8; margin-bottom: 30px;">Data diambil langsung dari Database Excel</p>

        <div class="input-group" style="display: grid; gap: 15px;">
            <div>
                <label>Pilih Produk Asuransi</label>
                <select id="productType" style="width: 100%; padding: 10px; border-radius: 8px; background: #0f172a; color: white; border: 1px solid #334155;"></select>
            </div>

            <div>
                <label>Uang Pertanggungan (UP)</label>
                <select id="upTarget" style="width: 100%; padding: 10px; border-radius: 8px; background: #0f172a; color: white; border: 1px solid #334155;">
                    <option value="200000000">Rp 200.000.000 (200 Juta)</option>
                    <option value="500000000">Rp 500.000.000 (500 Juta)</option>
                    <option value="1000000000">Rp 1.000.000.000 (1 Miliar)</option>
                </select>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div>
                    <label>Usia Peserta</label>
                    <input id="umur" type="number" placeholder="Contoh: 30" style="width: 100%; padding: 10px; border-radius: 8px; background: #0f172a; color: white; border: 1px solid #334155;">
                </div>
                <div>
                    <label>Jenis Kelamin</label>
                    <select id="gender" style="width: 100%; padding: 10px; border-radius: 8px; background: #0f172a; color: white; border: 1px solid #334155;">
                        <option value="pria">Laki-laki</option>
                        <option value="wanita">Perempuan</option>
                    </select>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div>
                    <label>Masa Setor</label>
                    <select id="paymentTerm" style="width: 100%; padding: 10px; border-radius: 8px; background: #0f172a; color: white; border: 1px solid #334155;">
                        <option value="5">5 Tahun</option>
                        <option value="10" selected>10 Tahun</option>
                        <option value="15">15 Tahun</option>
                    </select>
                </div>
                <div>
                    <label>Frekuensi Bayar</label>
                    <select id="paymentFreq" style="width: 100%; padding: 10px; border-radius: 8px; background: #0f172a; color: white; border: 1px solid #334155;">
                        <option value="12">Bulanan</option>
                        <option value="1">Tahunan</option>
                    </select>
                </div>
            </div>
        </div>

        <button id="hitungBtn" style="width: 100%; margin-top: 25px; padding: 15px; background: #38bdf8; color: #0f172a; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1rem;">
            HITUNG ESTIMASI PREMI
        </button>

        <div id="hasilDisplay" style="display:none; text-align:center; margin-top:30px; border-top: 1px solid #334155; padding-top: 20px;">
            <p style="color: #94a3b8; margin-bottom: 5px;">Estimasi Premi Lu:</p>
            <h2 id="finalPremi" style="color:#facc15; font-size: 2.2rem; margin:0;"></h2>
            <div id="rincianBawah" style="margin-top: 15px; text-align: left; font-size: 0.9rem;"></div>
        </div>
    </div>
</div>

<script src="js/calc.js"></script>
</body>
</html>
